spring.application.name=LoanManagementSystem2
# spring.profiles.active=PROD
# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# // check with localhost:3000 using docker compose
jwt.secret=${JWT_SECRET:Hi there I am secret key for this project Loan Management System}
# jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Groq API Key
groq.api.key=${GROQ.API.KEY} 

# ───────────────────────────────
# Actuator — expose endpoints
# ───────────────────────────────
management.endpoints.web.exposure.include=prometheus,health,metrics,info
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=LoanManagementSystem2
# management.metrics.tags.instance=backend:8080// to check for locally uncommit it and uncommit in docker.yml file prometheus and grafana configuration " configs: section and grafana-data in volume section ""
management.metrics.tags.instance=loanmanagementsystem.up.railway.app 
management.metrics.tags.environment=production